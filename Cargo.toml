[workspace]
resolver = "2"
members = [
  "ayaya-lib",
  "ayaya-runner-local",
  "ayaya-runner-shuttle",
  "entity-archive",
  "entity-sqlite",
  "migration-archive",
  "migration-sqlite",
]
default-members = ["ayaya-lib", "ayaya-runner-local"]

[workspace.package]
version = "0.14.0"
edition = "2024"
rust-version = "1.88.0"

[workspace.dependencies]
bincode = { version = "2.0.0-rc.3", features = ["serde"] }
entity-archive = { path = "entity-archive" }
miette = { version = "7", features = ["fancy"] }
migration-archive = { path = "migration-archive" }
sea-orm = { version = "1", features = [
  "macros",
  "runtime-tokio-rustls",
  "sqlx-mysql",
  "sqlx-sqlite",
  "with-json",
  "with-time",
  "with-uuid",
] }
shuttle-runtime = { version = "0.51", default-features = false }
thiserror = { version = "1" }
tokio = { version = "1", features = ["macros", "rt-multi-thread", "tracing"] }

